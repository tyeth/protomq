[pytest]
# WipperSnapper video/QR test pipeline configuration
testpaths = tests

# Custom markers
markers =
    board: mark test with the Adafruit product URL of the board under test

# Custom ini values used by video_capture fixtures
# Override on the command line: --video-device=1
video_device = 0
video_fps = 30
video_width = 1280
video_height = 720
artifacts_dir = artifacts

# Show extra test summary info
addopts = -v --tb=short
